<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eng-learn</title>
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <main class="container">
      <h1>eng-learn</h1>
      <p>Local shadowing coach (YouTube + Whisper + LLM feedback)</p>

      <section class="card">
        <h2>Import YouTube Episode</h2>
        <form id="import-form">
          <label>YouTube URL</label>
          <input id="yt-url" type="url" required placeholder="https://youtu.be/..." />
          <label>Language</label>
          <input id="yt-lang" type="text" value="en" />
          <label>Transcript Mode</label>
          <select id="yt-mode">
            <option value="strict_whisper" selected>strict_whisper (Recommended)</option>
            <option value="youtube_incremental">youtube_incremental (rolling subtitle cleaner)</option>
            <option value="youtube_default">youtube_default (basic subtitle split)</option>
          </select>
          <button type="submit">Import</button>
        </form>
        <p id="import-status"></p>
      </section>

      <section class="card">
        <h2>Episodes</h2>
        {% if episodes %}
        <ul>
          {% for e in episodes %}
          <li>
            <a href="/practice/{{ e.id }}">#{{ e.id }} {{ e.title }} [{{ e.transcript_mode }}]</a>
          </li>
          {% endfor %}
        </ul>
        {% else %}
        <p>No episodes imported yet.</p>
        {% endif %}
      </section>
    </main>

    <script>
      const form = document.getElementById('import-form');
      const statusEl = document.getElementById('import-status');

      function renderStatus(message, readyEpisodeId = null) {
        statusEl.textContent = message;
        if (readyEpisodeId !== null) {
          const spacer = document.createElement('span');
          spacer.textContent = ' ';
          const link = document.createElement('a');
          link.href = `/practice/${readyEpisodeId}`;
          link.textContent = 'Start shadowing now';
          statusEl.appendChild(spacer);
          statusEl.appendChild(link);
        }
      }

      async function pollJob(jobId) {
        const startedAt = Date.now();
        for (;;) {
          try {
            const res = await fetch(`/api/import-jobs/${jobId}`);
            const data = await res.json();
            const stage = data.stage || 'working';
            const pct = Number.isFinite(data.progress_pct) ? data.progress_pct : 0;
            const detail = data.stage_message ? ` - ${data.stage_message}` : '';
            const elapsedSec = Math.floor((Date.now() - startedAt) / 1000);
            renderStatus(`Job ${jobId}: ${data.status} (${pct}%) [${stage}]${detail} (${elapsedSec}s elapsed)`);
            if (data.ready_to_shadow) {
              renderStatus(
                `Completed. Episode ID: ${data.episode_id}. You can start shadowing now.`,
                data.episode_id
              );
              setTimeout(() => window.location.reload(), 1200);
              return;
            }
            if (data.status === 'failed') {
              renderStatus(`Failed: ${data.error_message}`);
              return;
            }
          } catch (err) {
            renderStatus(`Polling error: ${String(err)}. Retrying...`);
          }
          await new Promise((r) => setTimeout(r, 1500));
        }
      }

      form.addEventListener('submit', async (ev) => {
        ev.preventDefault();
        renderStatus('Submitting import job...');
        const payload = {
          url: document.getElementById('yt-url').value,
          preferred_lang: document.getElementById('yt-lang').value || 'en',
          transcript_mode: document.getElementById('yt-mode').value || 'strict_whisper',
        };
        const res = await fetch('/api/youtube/import', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) {
          renderStatus(data.detail || 'Import request failed');
          return;
        }
        pollJob(data.id);
      });
    </script>
  </body>
</html>
