<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eng-learn</title>
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <main class="container">
      <h1>eng-learn</h1>
      <p>Local shadowing coach (YouTube + Whisper + LLM feedback)</p>

      <section class="card">
        <h2>Import YouTube Episode</h2>
        <form id="import-form">
          <label>YouTube URL</label>
          <input id="yt-url" type="url" required placeholder="https://youtu.be/..." />
          <label>Language</label>
          <input id="yt-lang" type="text" value="en" />
          <label>Transcript Mode</label>
          <select id="yt-mode">
            <option value="strict_whisper" selected>strict_whisper (Recommended)</option>
            <option value="youtube_default">youtube_default</option>
          </select>
          <button type="submit">Import</button>
        </form>
        <p id="import-status"></p>
      </section>

      <section class="card">
        <h2>Episodes</h2>
        {% if episodes %}
        <ul>
          {% for e in episodes %}
          <li>
            <a href="/practice/{{ e.id }}">#{{ e.id }} {{ e.title }}</a>
          </li>
          {% endfor %}
        </ul>
        {% else %}
        <p>No episodes imported yet.</p>
        {% endif %}
      </section>
    </main>

    <script>
      const form = document.getElementById('import-form');
      const statusEl = document.getElementById('import-status');

      async function pollJob(jobId) {
        for (let i = 0; i < 180; i++) {
          const res = await fetch(`/api/import-jobs/${jobId}`);
          const data = await res.json();
          statusEl.textContent = `Job ${jobId}: ${data.status}`;
          if (data.status === 'completed') {
            statusEl.textContent = `Completed. Episode ID: ${data.episode_id}. Refreshing...`;
            setTimeout(() => window.location.reload(), 1000);
            return;
          }
          if (data.status === 'failed') {
            statusEl.textContent = `Failed: ${data.error_message}`;
            return;
          }
          await new Promise((r) => setTimeout(r, 1500));
        }
      }

      form.addEventListener('submit', async (ev) => {
        ev.preventDefault();
        statusEl.textContent = 'Submitting import job...';
        const payload = {
          url: document.getElementById('yt-url').value,
          preferred_lang: document.getElementById('yt-lang').value || 'en',
          transcript_mode: document.getElementById('yt-mode').value || 'strict_whisper',
        };
        const res = await fetch('/api/youtube/import', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) {
          statusEl.textContent = data.detail || 'Import request failed';
          return;
        }
        pollJob(data.id);
      });
    </script>
  </body>
</html>
